<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIM GAYEON Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050505;
  color:#f4f4f4;
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow-x:hidden;
}
.noise{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
  background-image:radial-gradient(#c8ff00 1px, transparent 1px);
  background-size:18px 18px;
  z-index:0;
}
header{
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(18px);
  background:rgba(5,5,5,.72);
  border-bottom:1px solid rgba(200,255,0,.18);
}
nav{
  max-width:1280px;
  margin:auto;
  padding:18px 26px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  color:#c8ff00;
  font-size:22px;
  font-weight:950;
}
.menu{
  display:flex;
  gap:22px;
  font-size:14px;
  color:#aaa;
}
.hero{
  position:relative;
  z-index:1;
  max-width:1280px;
  margin:auto;
  padding:80px 26px 38px;
}
.badge{
  display:inline-flex;
  border:1px solid #c8ff00;
  color:#c8ff00;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  margin-bottom:22px;
  box-shadow:0 0 22px rgba(200,255,0,.22);
}
h1{
  font-size:clamp(48px,9vw,118px);
  line-height:.88;
  letter-spacing:-6px;
  text-transform:uppercase;
}
h1 em{
  color:#c8ff00;
  font-style:normal;
  text-shadow:0 0 28px rgba(200,255,0,.48);
}
.filter{
  position:relative;
  z-index:1;
  max-width:1280px;
  margin:0 auto 26px;
  padding:0 26px;
  display:flex;
  gap:10px;
}
.chip{
  border:1px solid #222;
  background:#c8ff00;
  color:#050505;
  padding:10px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
}

.add-area{
  position:relative;
  z-index:1;
  max-width:1280px;
  margin:-12px auto 30px;
  padding:0 26px;
}
.add-image-btn{
  width:100%;
  max-width:320px;
  height:56px;
  background:#111;
  border:2px solid #6b6b6b;
  border-radius:14px;
  color:#fff;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:-.3px;
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;
}
.add-image-btn:hover{
  border-color:#999;
  background:#171717;
}
.delete-image-btn{
  display:none;
  position:fixed;
  left:50%;
  bottom:26px;
  transform:translateX(-50%);
  z-index:1001;
  min-width:220px;
  height:54px;
  padding:0 26px;
  background:#111;
  border:2px solid #6b6b6b;
  border-radius:14px;
  color:#fff;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}
.delete-image-btn.show{display:block}

.gallery{
  position:relative;
  z-index:1;
  max-width:1280px;
  margin:auto;
  padding:0 26px 90px;
  columns:4 230px;
  column-gap:18px;
}
.card{
  break-inside:avoid;
  height:360px;
  margin-bottom:18px;
  border-radius:26px;
  overflow:hidden;
  background:#111;
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  position:relative;
  transition:.25s ease;
}
.card:hover{
  transform:translateY(-6px);
  border-color:rgba(200,255,0,.65);
  box-shadow:0 18px 50px rgba(200,255,0,.12);
}
.card img{
  width:100%;
  min-height:360px;
  display:block;
  object-fit:cover;
  object-position:top;
  transition:3s ease;
}
.card:hover img{
  transform:translateY(calc(-100% + 360px));
}
.card::after{
  content:"CLICK TO VIEW";
  position:absolute;
  left:14px;
  bottom:14px;
  background:rgba(5,5,5,.74);
  color:#c8ff00;
  border:1px solid rgba(200,255,0,.35);
  border-radius:999px;
  padding:7px 11px;
  font-size:11px;
  font-weight:800;
  opacity:0;
  transform:translateY(8px);
  transition:.25s;
  pointer-events:none;
  backdrop-filter:blur(10px);
}
.card:hover::after{
  opacity:1;
  transform:translateY(0);
}
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:#000;
  padding:0;
  overflow:auto;
}
.lightbox.active{
  display:block;
}
.full-image{
  display:block;
  width:auto;
  max-width:none;
  height:auto;
  margin:0 auto;
  border-radius:0;
  box-shadow:none;
}
.close{
  position:fixed;
  top:18px;
  right:24px;
  color:#c8ff00;
  font-size:44px;
  line-height:1;
  cursor:pointer;
  z-index:1000;
}
footer{
  border-top:1px solid rgba(200,255,0,.16);
  padding:34px 26px;
  color:#777;
  text-align:center;
  position:relative;
  z-index:1;
}
@media(max-width:760px){
  h1{letter-spacing:-3px}
  .menu{display:none}
  
.add-area{
  position:relative;
  z-index:1;
  max-width:1280px;
  margin:-12px auto 30px;
  padding:0 26px;
}
.add-image-btn{
  width:100%;
  max-width:320px;
  height:56px;
  background:#111;
  border:2px solid #6b6b6b;
  border-radius:14px;
  color:#fff;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:-.3px;
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;
}
.add-image-btn:hover{
  border-color:#999;
  background:#171717;
}
.delete-image-btn{
  display:none;
  position:fixed;
  left:50%;
  bottom:26px;
  transform:translateX(-50%);
  z-index:1001;
  min-width:220px;
  height:54px;
  padding:0 26px;
  background:#111;
  border:2px solid #6b6b6b;
  border-radius:14px;
  color:#fff;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}
.delete-image-btn.show{display:block}

.gallery{columns:2 160px}
  .card{height:280px}
  .card img{min-height:280px}
  .card:hover img{transform:translateY(calc(-100% + 280px))}
}

@media(max-width:760px){
  .lightbox{overflow-x:hidden;padding:60px 10px 80px;}
  .full-wrap{width:100%;}
  #fullImage{width:100%;max-width:100%;height:auto;}
}


@media(max-width:760px){
  .lightbox{overflow-x:hidden;padding:60px 10px 80px;}
  .full-image{width:100%;max-width:100%;height:auto;}
}
</style>
</head>
<body>
<div class="noise"></div>

<header>
  <nav>
    <div class="logo">GY</div>
    <div class="menu">
      <span>Work</span>
      <span>About</span>
      <span>Contact</span>
    </div>
  </nav>
</header>

<section class="hero">
  <h1>LIM<br><em>GAYEON</em><br>DESIGN</h1>
</section>

<section class="filter">
  <div class="chip">상세페이지</div>
</section>
<main class="gallery" id="gallery"></main>

<div class="lightbox" id="lightbox">
  <div class="close" id="closeBtn">&times;</div>
  <img class="full-image" id="fullImage" alt="">
</div>


<footer>© 2026 LIM GAYEON</footer>



<script>
/*
  GitHub 저장소에 images 폴더를 만들고 이미지 파일을 올린 뒤,
  아래 IMAGE_FILES에 경로만 추가하세요.

  예시:
  const IMAGE_FILES = Array.from({length:100},(_,i)=>`p_images/${i+1}.png`);
*/
const IMAGE_FILES = Array.from({length:100},(_,i)=>`p_images/${i+1}.png`);

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const closeBtn = document.getElementById("closeBtn");

function getFullImage(){
  let full = document.querySelector(".full-image") || document.getElementById("fullImage");
  if(!full){
    full = document.createElement("img");
    full.className = "full-image";
    lightbox.appendChild(full);
  }
  return full;
}

function bindCard(card){
  card.addEventListener("click", () => {
    const img = card.querySelector("img");
    const full = getFullImage();
    full.src = img.src;
    full.alt = img.alt || "";
    lightbox.classList.add("active");
  });
}

function createCard(src, title = "상세페이지", id = "img-" + Date.now()){
  const card = document.createElement("article");
  card.className = "card";
  card.dataset.id = id;
  card.dataset.title = title;
  card.innerHTML = `<img src="${src}" alt="${title}">`;
  bindCard(card);
  gallery.appendChild(card);
}

function loadStaticImages(){
  IMAGE_FILES.forEach((src,i)=>{
    const img=new Image();
    img.onload=()=>createCard(src,"상세페이지 "+(i+1),"static-"+i);
    img.src=src;
  });
}

if(closeBtn){
  closeBtn.addEventListener("click", () => {
    lightbox.classList.remove("active");
  });
}

if(lightbox){
  lightbox.addEventListener("click", (e) => {
    if(e.target === lightbox){
      lightbox.classList.remove("active");
    }
  });
}

loadStaticImages();
</script>

</body>
</html>
